// Sort alphabetically by brand then model
allBikes.sort((a, b) => a.brand.localeCompare(b.brand) || a.model.localeCompare(b.model));

let filteredBikes = [...allBikes];
const ITEMS_PER_PAGE = 20;
let currentPage = 1;

const domElements = {
  grid: document.getElementById('gallery-grid'),
  brandFilter: document.getElementById('brand-filter'),
  categoryFilter: document.getElementById('category-filter'),
  displacementFilter: document.getElementById('displacement-filter'),
  weightFilter: document.getElementById('weight-filter'),
  seatFilter: document.getElementById('seat-filter'),
  resetBtn: document.getElementById('reset-filters'),
  countSpan: document.getElementById('result-count'),
  prevBtn: document.getElementById('prev-page'),
  nextBtn: document.getElementById('next-page'),
  pageInfo: document.getElementById('page-info')
};

function initFilters() {
  const brands = [...new Set(allBikes.map(b => b.brand))].sort();
  brands.forEach(b => {
    if(!b) return;
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    domElements.brandFilter.appendChild(opt);
  });
  
  const categories = [...new Set(allBikes.map(b => b.category))].sort();
  categories.forEach(c => {
    if(!c) return;
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    domElements.categoryFilter.appendChild(opt);
  });
}

function applyFilters() {
  const brand = domElements.brandFilter.value;
  const category = domElements.categoryFilter.value;
  const disp = domElements.displacementFilter.value;
  const weight = domElements.weightFilter.value;
  const seat = domElements.seatFilter.value;
  
  filteredBikes = allBikes.filter(b => {
    if(brand && b.brand !== brand) return false;
    if(category && b.category !== category) return false;
    
    if(disp && disp !== 'all') {
      if(disp === 'low' && b.displacement > 160) return false;
      if(disp === 'mid-low' && (b.displacement <= 160 || b.displacement > 300)) return false;
      if(disp === 'mid-high' && (b.displacement <= 300 || b.displacement > 600)) return false;
      if(disp === 'high' && b.displacement <= 600) return false;
    }

    if(weight && weight !== 'all') {
      if(weight === 'light' && b.weight > 150) return false;
      if(weight === 'mid' && (b.weight <= 150 || b.weight > 200)) return false;
      if(weight === 'heavy' && b.weight <= 200) return false;
    }

    if(seat && seat !== 'all') {
      if(seat === 'low' && b.seat > 780) return false;
      if(seat === 'mid' && (b.seat <= 780 || b.seat > 830)) return false;
      if(seat === 'high' && b.seat <= 830) return false;
    }

    // Only show valid images
    if(!b.image || b.image.includes('null') || !b.image.includes('/assets/images/')) return false;
    return true;
  });
  
  currentPage = 1;
  renderGallery();
}

function renderGallery() {
  domElements.countSpan.textContent = filteredBikes.length;
  
  const totalPages = Math.ceil(filteredBikes.length / ITEMS_PER_PAGE);
  domElements.pageInfo.textContent = `Página ${currentPage} de ${totalPages || 1}`;
  
  domElements.prevBtn.disabled = currentPage === 1;
  domElements.nextBtn.disabled = currentPage === totalPages || totalPages === 0;
  
  const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = filteredBikes.slice(startIdx, startIdx + ITEMS_PER_PAGE);
  
  domElements.grid.innerHTML = pageItems.map(b => `
    <div class="gallery-item">
      <img src="${b.image}" alt="${b.brand} ${b.model}" loading="lazy" style="cursor: zoom-in;" onclick="openLightbox('${b.image}')">
      <a href="${b.url}" class="gallery-item-info" style="text-decoration: none; color: inherit; display: block; border-top: 1px solid var(--color-border, #e9ecef);">
        <h4>${b.brand}</h4>
        <p>${b.model}</p>
        <p style="font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.7;">${b.category} • ${b.displacement}cc</p>
      </a>
    </div>
  `).join('');
}

// Lightbox Logic
const lightbox = document.getElementById('image-lightbox');
const lightboxImg = document.getElementById('lightbox-img');

window.openLightbox = function(src) {
  lightboxImg.src = src;
  lightbox.classList.add('active');
};

lightbox.addEventListener('click', () => {
  lightbox.classList.remove('active');
});

// Event Listeners
domElements.brandFilter.addEventListener('change', applyFilters);
domElements.categoryFilter.addEventListener('change', applyFilters);
domElements.displacementFilter.addEventListener('change', applyFilters);
domElements.weightFilter.addEventListener('change', applyFilters);
domElements.seatFilter.addEventListener('change', applyFilters);

domElements.resetBtn.addEventListener('click', () => {
  domElements.brandFilter.value = '';
  domElements.categoryFilter.value = '';
  domElements.displacementFilter.value = 'all';
  domElements.weightFilter.value = 'all';
  domElements.seatFilter.value = 'all';
  applyFilters();
});

domElements.prevBtn.addEventListener('click', () => {
  if (currentPage > 1) {
    currentPage--;
    renderGallery();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

domElements.nextBtn.addEventListener('click', () => {
  const totalPages = Math.ceil(filteredBikes.length / ITEMS_PER_PAGE);
  if (currentPage < totalPages) {
    currentPage++;
    renderGallery();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

// Init
initFilters();
applyFilters(); // Initial render
</script>
